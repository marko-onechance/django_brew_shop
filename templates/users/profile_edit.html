{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Profile | Hop & Barley{% endblock %}

{% block content %}
<main class="auth-page-wrapper">
  <div class="auth-form-container" style="max-width: 560px;">
    <div class="auth-container" style="padding: 2rem;">
      <h1 class="auth-title" style="margin-bottom: 1.5rem;">Edit Profile</h1>

      <form method="post" action="{% url 'profile_edit' %}">
        {% csrf_token %}

        <div class="checkout-form-group">
          <label for="first_name">First Name</label>
          <input type="text" id="first_name" name="first_name" class="Input"
                 value="{{ request.user.first_name }}" placeholder="John">
        </div>

        <div class="checkout-form-group">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" class="Input"
                 value="{{ request.user.last_name }}" placeholder="Doe">
        </div>

        <div class="checkout-form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="Input"
                 value="{{ request.user.email }}" placeholder="john@example.com">
        </div>

        <div class="checkout-form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" class="Input"
                 value="{{ profile.phone }}" placeholder="+380991234567">
        </div>

        <div class="checkout-form-group">
          <label for="bio">Bio</label>
          <textarea id="bio" name="bio" class="Textarea" rows="3"
                    placeholder="Tell us a little about yourself...">{{ profile.bio }}</textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button type="submit" class="button button--primary" style="flex: 1;">Save Changes</button>
          <a href="{% url 'account' %}" class="button button--secondary" style="flex: 1; text-align: center; line-height: 2.5;">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</main>
{% endblock %}
