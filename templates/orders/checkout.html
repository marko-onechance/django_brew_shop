{% extends 'base.html' %}
{% load static %}

{% block title %}Checkout | Hop & Barley{% endblock %}

{% block content %}
<main class="checkout-page-wrapper">
    <div class="checkout-container">
        <h1 class="checkout-title">Order Details</h1>

        <form id="checkout-form" method="post" action="{% url 'checkout' %}">
            {% csrf_token %}
            <!-- Shipping Information -->
            <section class="checkout-section">
                <h2 class="checkout-section__title">Shipping information</h2>
                <div class="checkout-form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="full_name" class="Input" placeholder="John Doe" required>
                </div>
                <div class="checkout-form-group">
                    <label for="phone">Phone number</label>
                    <input type="tel" id="phone" name="phone" class="Input" placeholder="+380991234567" required>
                </div>
                <div class="checkout-form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" class="Input" placeholder="Kyiv" required>
                </div>
                <div class="checkout-form-group">
                    <label for="address">Shipping address</label>
                    <textarea id="address" name="address" class="Textarea" placeholder="Street, building, appt" rows="3" required></textarea>
                </div>
            </section>

            <!-- Payment Method -->
            <section class="checkout-section">
                <h2 class="checkout-section__title">Payment Method</h2>
                <div class="payment-options">
                    <label class="radio-option">
                        <input type="radio" name="payment_method" value="debit" checked>
                        <span class="radio-custom"></span>
                        <span class="radio-label">Debit Card (Simulation)</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="payment_method" value="cod">
                        <span class="radio-custom"></span>
                        <span class="radio-label">Cash On Delivery</span>
                    </label>
                </div>
            </section>

            <!-- Order Summary -->
            <section class="checkout-summary">
                <h2 class="checkout-section__title">Order Summary</h2>
                <div class="summary-details">
                    <div class="summary-total">
                        <p>Total</p>
                        <p>${{ cart.get_total_price }}</p>
                    </div>
                    <button type="submit" class="button button--primary button--pay">Confirm Order</button>
                </div>
            </section>
        </form>
    </div>
</main>
{% endblock %}
