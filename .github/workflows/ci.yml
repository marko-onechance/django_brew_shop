name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: myshop_db
          POSTGRES_USER: myshop_user
          POSTGRES_PASSWORD: myshop_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_NAME: myshop_db
      DATABASE_USER: myshop_user
      DATABASE_PASSWORD: myshop_password
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      SECRET_KEY: ci-insecure-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest \
            tests/ products/tests.py users/tests.py reviews/tests.py \
            --cov=. --cov-report=term-missing -q

      - name: Lint with flake8
        run: flake8 . --count --statistics

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports --exclude venv
        continue-on-error: true
